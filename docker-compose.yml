services:
  db:
    image: postgres:16
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    network_mode: host
    volumes:
      - ./Uploads:/app/Uploads
      - ./logs:/app/logs
    depends_on:
      - db

volumes:
  pgdata:
